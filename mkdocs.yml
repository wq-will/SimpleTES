site_name: SimpleEvolve
site_url: https://luoqm6will.github.io/SimpleEvolve/
repo_url: https://github.com/luoqm6will/SimpleEvolve

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

nav:
  - Home: index.html
  - Documentation: guides/documentation.md
  - Getting Started:
    - Installation: guides/installation.md
    - Quick Start: guides/quickstart.md
  - User Guide:
    - Architecture: guides/architecture.md
    - CLI Options: guides/cli-options.md
    - Adding Tasks: guides/adding-tasks.md
    - Advanced Usage: guides/advanced.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.inlinehilite
  - admonition
  - pymdownx.details
  - tables

plugins:
  - search

extra_javascript:
  - https://unpkg.com/mermaid@10/dist/mermaid.min.js
  - javascripts/mermaid-init.js
